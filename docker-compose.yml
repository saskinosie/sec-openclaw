services:
  openclaw:
    build: ./custom-claw
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  telegram-bot:
    build: ./custom-claw
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "telegram_bot.py"]
    restart: unless-stopped
